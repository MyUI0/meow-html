<script>
function loadConfig(callback) {
  function tryLoad(path) {
    var s = document.createElement('script');
    s.src = path;
    s.onload = function() { if (callback) callback(window.__site_config); };
    s.onerror = function() { if (callback) callback(null); };
    document.head.appendChild(s);
  }
  tryLoad('./content/config.js');
}
loadConfig(function(config) {
  if (config && config.start_date) {
    var rt = document.getElementById('runtime');
    if (rt) rt.setAttribute('data-startdate', config.start_date);
  }
});
</script>

<script>
(function() {
  var bookSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="icon" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z"/><path d="M10 19H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h6a2 2 0 0 1 2 2 2 2 0 0 1 2-2h6a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-6a2 2 0 0 0-2 2 2 2 0 0 0-2-2M12 5v16M7 7h1M7 11h1M16 7h1M16 11h1M16 15h1"/></svg>';

  function loadArticles(callback) {
    function tryLoad(path) {
      var s = document.createElement('script');
      s.src = path;
      s.onload = function() { if (callback) callback(window.__articles); };
      s.onerror = function() { if (callback) callback(null); };
      document.head.appendChild(s);
    }
    tryLoad('./content/articles.js');
  }
  loadArticles(function(articles) {
    if (!articles) {
      console.error('加载文章列表失败');
      var listEl = document.getElementById('category-container');
      if (listEl) listEl.innerHTML = '<p style="text-align:center;padding:2rem;">加载文章失败，请稍后重试。</p>';
      return;
    }
      var categoryMap = {};
      var categoryFirstArticle = {};
      articles.forEach(function(a) {
        a.categories.forEach(function(c) {
          categoryMap[c] = (categoryMap[c] || 0) + 1;
          if (!categoryFirstArticle[c]) categoryFirstArticle[c] = a.id;
        });
      });

      var container = document.getElementById('category-container');
      var html = '';

      Object.keys(categoryMap).forEach(function(cat) {
        var count = categoryMap[cat];
        var firstId = categoryFirstArticle[cat];
        html += '<div class="category-content">';
        html += '  <div class="category-item">';
        html += '    <div class="category-name">';
        html += '      <a href="post.html?id=' + firstId + '">' + cat + '</a>';
        html += '    </div>';
        html += '    <a class="category-count" href="javascript:void(0)">';
        html += '      ' + bookSvg;
        html += '      <span>' + count + '</span>';
        html += '    </a>';
        html += '  </div>';
        html += '</div>';
      });

      container.innerHTML = html;
  });
})();
