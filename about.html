<script>
function loadConfig(callback) {
  function tryLoad(path) {
    var s = document.createElement('script');
    s.src = path;
    s.onload = function() { if (callback) callback(window.__site_config); };
    s.onerror = function() { if (callback) callback(null); };
    document.head.appendChild(s);
  }
  tryLoad('./content/config.js');
}
loadConfig(function(config) {
  if (config && config.start_date) {
    var rt = document.getElementById('runtime');
    if (rt) rt.setAttribute('data-startdate', config.start_date);
  }
});
</script>

<script>
// 从 config.js 加载关于页面内容
loadConfig(function(config) {
  if (!config) {
    document.getElementById('about-content').innerHTML = '<p>加载关于页面失败</p>';
    return;
  }
  var about = config.about || {};
  var html = '';

  // 个人简介
  if (about.avatar) {
    html += '<div style="text-align:center;margin-bottom:1.5rem">';
    html += '<img src="' + about.avatar + '" alt="头像" style="width:120px;height:120px;border-radius:50%;object-fit:cover">';
    html += '</div>';
  }

  if (about.name) {
    html += '<h2 style="text-align:center">' + about.name + '</h2>';
  }

  if (about.bio) {
    html += '<p style="text-align:center;color:var(--font-color-secondary)">' + about.bio + '</p>';
  }

  // 详细介绍（支持 HTML）
  if (about.content) {
    html += about.content;
  }

  // 技能/标签
  if (about.skills && about.skills.length > 0) {
    html += '<h3>技能</h3><ul>';
    about.skills.forEach(function(s) { html += '<li>' + s + '</li>'; });
    html += '</ul>';
  }

  // 社交链接
  if (about.social && Object.keys(about.social).length > 0) {
    html += '<h3>联系方式</h3><ul>';
    Object.keys(about.social).forEach(function(name) {
      var url = about.social[name];
      html += '<li><a href="' + url + '" target="_blank">' + name + '</a></li>';
    });
    html += '</ul>';
  }

  document.getElementById('about-content').innerHTML = html;
});
</script>
