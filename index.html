<script>
function loadConfig(callback) {
  function tryLoad(path) {
    var s = document.createElement('script');
    s.src = path;
    s.onload = function() { if (callback) callback(window.__site_config); };
    s.onerror = function() { if (callback) callback(null); };
    document.head.appendChild(s);
  }
  tryLoad('./content/config.js');
}
loadConfig(function(config) {
  if (config && config.start_date) {
    var rt = document.getElementById('runtime');
    if (rt) rt.setAttribute('data-startdate', config.start_date);
  }
});
</script>

<script>
(function() {
  var loadingImg = GLOBALCONFIG.lazyload_src || 'assets/images/Meow-Loading.webp';

  function loadArticles(callback) {
    function tryLoad(path) {
      var s = document.createElement('script');
      s.src = path;
      s.onload = function() { if (callback) callback(window.__articles); };
      s.onerror = function() { if (callback) callback(null); };
      document.head.appendChild(s);
    }
    tryLoad('./content/articles.js');
  }
  loadArticles(function(articles) {
    if (!articles) {
      console.error('加载文章列表失败');
      var listEl = document.getElementById('article-list');
      if (listEl) listEl.innerHTML = '<p style="text-align:center;padding:2rem;">加载文章失败，请稍后重试。</p>';
      return;
    }
      // Render article cards
      var listEl = document.getElementById('article-list');
      var html = '';
      articles.forEach(function(a) {
        var catLinks = a.categories.map(function(c) {
          return '<a href="categories.html">' + c + '</a>';
        }).join('');
        var tagLinks = a.tags.map(function(t) {
          return '<a href="tags.html">' + t + '</a>';
        }).join('');

        html += '<div class="home-article">';
        html += '  <div class="home-article-cover">';
        html += '    <a href="post.html?id=' + a.id + '">';
        html += '      <img class="lazyload" data-src="' + a.cover + '" src="' + loadingImg + '" alt="文章封面">';
        html += '    </a>';
        html += '  </div>';
        html += '  <div class="home-article-content">';
        html += '    <div class="home-article-title">';
        html += '      <a href="post.html?id=' + a.id + '">' + a.title + '</a>';
        html += '    </div>';
        html += '    <div class="home-article-excerpt">' + a.excerpt + '</div>';
        html += '    <div class="home-article-info-container">';
        html += '      <div class="home-article-info">';
        html += '        <div class="home-article-date">';
        html += '          <img src="assets/svg/ta/ta-pubdate.svg" class="icon" alt="pubdate">';
        html += '          <span>' + a.date + '</span>';
        html += '        </div>';
        html += '        <div class="home-article-categories">';
        html += '          <img src="assets/svg/uc/uc-category.svg" class="icon" alt="category">';
        html += '          ' + catLinks;
        html += '        </div>';
        html += '        <div class="home-article-tags">';
        html += '          <img src="assets/svg/uc/uc-tag.svg" class="icon" alt="tag">';
        html += '          ' + tagLinks;
        html += '        </div>';
        html += '      </div>';
        html += '      <div class="home-article-func">';
        html += '        <a class="read-more-btn" href="post.html?id=' + a.id + '">阅读全文 >></a>';
        html += '      </div>';
        html += '    </div>';
        html += '  </div>';
        html += '</div>';
      });
      listEl.innerHTML = html;

      // Re-init lazyload
      if (typeof initLazyLoad === 'function') initLazyLoad();

      // Build sidebar statistics
      var categoryMap = {};
      var tagMap = {};
      articles.forEach(function(a) {
        a.categories.forEach(function(c) {
          categoryMap[c] = (categoryMap[c] || 0) + 1;
        });
        a.tags.forEach(function(t) {
          tagMap[t] = (tagMap[t] || 0) + 1;
        });
      });

      var uniqueCategories = Object.keys(categoryMap);
      var uniqueTags = Object.keys(tagMap);

      document.getElementById('stat-archive').textContent = articles.length;
      document.getElementById('stat-categories').textContent = uniqueCategories.length;
      document.getElementById('stat-tags').textContent = uniqueTags.length;

      // Render sidebar categories
      var catHtml = '';
      uniqueCategories.forEach(function(c) {
        catHtml += '<a href="categories.html" class="sidebar-categories">' + c + ' (' + categoryMap[c] + ')</a> ';
      });
      document.getElementById('sidebar-categories-content').innerHTML = catHtml;

      // Render sidebar tags
      var tagHtml = '';
      uniqueTags.forEach(function(t) {
        tagHtml += '<a href="tags.html" class="sidebar-tags">' + t + '</a> ';
      });
      document.getElementById('sidebar-tags-content').innerHTML = tagHtml;
  });
})();
</script>
