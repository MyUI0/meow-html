<script>
function loadConfig(callback) {
  function tryLoad(path) {
    var s = document.createElement('script');
    s.src = path;
    s.onload = function() { if (callback) callback(window.__site_config); };
    s.onerror = function() { if (callback) callback(null); };
    document.head.appendChild(s);
  }
  tryLoad('/meow/content/config.js');
}
loadConfig(function(config) {
  if (config && config.start_date) {
    var rt = document.getElementById('runtime');
    if (rt) rt.setAttribute('data-startdate', config.start_date);
  }
});
</script>

<script>
// 从 /meow/content/articles.js 加载数据
function loadArticles(callback) {
  function tryLoad(path) {
    var s = document.createElement('script');
    s.src = path;
    s.onload = function() { if (callback) callback(window.__articles); };
    s.onerror = function() { if (callback) callback(null); };
    document.head.appendChild(s);
  }
  tryLoad('/meow/content/articles.js');
}
loadArticles(function(articles) {
  if (!articles) {
    console.error('加载文章列表失败');
    var listEl = document.getElementById('article-list');
    if (listEl) listEl.innerHTML = '<p style="text-align:center;padding:2rem;color:#999">加载文章失败，请检查 content/articles.json 是否存在</p>';
    return;
  }
    // 统计
    document.getElementById('stat-archive').textContent = articles.length;
    var cats = new Set(), tags = new Set();
    articles.forEach(function(a) {
      (a.categories || []).forEach(function(c) { cats.add(c); });
      (a.tags || []).forEach(function(t) { tags.add(t); });
    });
    document.getElementById('stat-categories').textContent = cats.size;
    document.getElementById('stat-tags').textContent = tags.size;

    // 分类列表
    var catHtml = '';
    cats.forEach(function(c) {
      var count = articles.filter(function(a) { return (a.categories || []).indexOf(c) !== -1; }).length;
      catHtml += '<a href="/meow/categories.html">' + c + ' (' + count + ')</a>';
    });
    document.getElementById('sidebar-categories-content').innerHTML = catHtml;

    // 标签列表
    var tagHtml = '';
    tags.forEach(function(t) {
      tagHtml += '<a href="/meow/tags.html">' + t + '</a> ';
    });
    document.getElementById('sidebar-tags-content').innerHTML = tagHtml;

    // 文章列表
    var html = '';
    articles.forEach(function(a) {
      html += '<div class="home-article">';
      html += '<div class="home-article-cover">';
      html += '<a href="/meow/post.html?id=' + a.id + '">';
      html += '<img class="lazyload" data-src="' + a.cover + '" src="/meow-assets/images/Meow-Loading.webp" alt="文章封面">';
      html += '</a></div>';
      html += '<div class="home-article-content">';
      html += '<div class="home-article-title"><a href="/meow/post.html?id=' + a.id + '">' + a.title + '</a></div>';
      html += '<div class="home-article-excerpt">' + a.excerpt + '</div>';
      html += '<div class="home-article-info-container">';
      html += '<div class="home-article-info">';
      html += '<div class="home-article-date"><img src="/meow-assets/svg/ta/ta-pubdate.svg" class="icon" alt="pubdate"><span>' + a.date + '</span></div>';
      html += '<div class="home-article-categories"><img src="/meow-assets/svg/uc/uc-category.svg" class="icon" alt="category">';
      (a.categories || []).forEach(function(c) { html += '<a href="/meow/categories.html">' + c + '</a>'; });
      html += '</div>';
      html += '<div class="home-article-tags"><img src="/meow-assets/svg/uc/uc-tag.svg" class="icon" alt="tag">';
      (a.tags || []).forEach(function(t) { html += '<a href="/meow/tags.html">' + t + '</a>'; });
      html += '</div></div>';
      html += '<div class="home-article-func"><a class="read-more-btn" href="/meow/post.html?id=' + a.id + '">阅读全文 >></a></div>';
      html += '</div></div></div>';
    });
    document.getElementById('article-list').innerHTML = html;

    // 重新初始化懒加载
    if (typeof initLazyLoad === 'function') initLazyLoad();
    if (typeof initImageView === 'function') initImageView();
});

// 打字机效果
var typed = new Typed('#site-subtitle', {
  strings: ["一个简洁的静态博客","记录技术与生活","欢迎来到我的小站"],
  typeSpeed: 100,
  backSpeed: 150,
  startDelay: 500,
  backDelay: 1500,
  loop: true,
  smartBackspace: true,
  fadeOut: true,
  shuffle: false
});
</script>
