<script>
function loadConfig(callback) {
  function tryLoad(path) {
    var s = document.createElement('script');
    s.src = path;
    s.onload = function() { if (callback) callback(window.__site_config); };
    s.onerror = function() { if (callback) callback(null); };
    document.head.appendChild(s);
  }
  tryLoad('./content/config.js');
}
loadConfig(function(config) {
  if (config && config.start_date) {
    var rt = document.getElementById('runtime');
    if (rt) rt.setAttribute('data-startdate', config.start_date);
  }
});
</script>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var articleId = params.get('id');

  if (!articleId) {
    document.getElementById('post-content-area').innerHTML = '<p>文章未找到</p>';
    return;
  }

  function loadArticles(callback) {
    function tryLoad(path) {
      var s = document.createElement('script');
      s.src = path;
      s.onload = function() { if (callback) callback(window.__articles); };
      s.onerror = function() { if (callback) callback(null); };
      document.head.appendChild(s);
    }
    tryLoad('./content/articles.js');
  }
  loadArticles(function(articles) {
    if (!articles) {
      console.error('加载文章列表失败');
      document.getElementById('post-content-area').innerHTML = '<p>加载文章失败</p>';
      return;
    }
      var article = articles.find(function(a) { return a.id === articleId; });
      if (!article) {
        document.getElementById('post-content-area').innerHTML = '<p>文章未找到</p>';
        return;
      }

      // Update page title
      document.title = article.title + ' | MEOW';

      // Update banner
      document.getElementById('post-banner-title').textContent = article.title;

      // Build post meta
      var catLinks = article.categories.map(function(c) { return '<a href="categories.html">' + c + '</a>'; }).join(' ');
      var tagLinks = article.tags.map(function(t) { return '<a href="tags.html">' + t + '</a>'; }).join(' ');

      var postHtml = '<h1 class="post-title">' + article.title + '</h1>';
      postHtml += '<div class="post-author"><span>作者：小橘猫</span></div>';
      postHtml += '<div class="post-meta"><div class="post-info"><div class="post-date">';
      postHtml += '<div class="post-pubdate"><img src="assets/svg/ta/ta-pubdate.svg" class="icon" alt="pubdate"><span>发布于 ' + article.date + '</span></div>';
      postHtml += '<div class="post-update"><img src="assets/svg/ta/ta-update.svg" class="icon" alt="update"><span>更新于 ' + article.updated + '</span></div>';
      postHtml += '</div><div class="post-attribute">';
      if (article.categories.length > 0) {
        postHtml += '<div class="post-categories"><img src="assets/svg/uc/uc-category.svg" class="icon" alt="category"><span>' + catLinks + '</span></div>';
      }
      if (article.tags.length > 0) {
        postHtml += '<div class="post-tags"><img src="assets/svg/uc/uc-tag.svg" class="icon" alt="tag"><span>' + tagLinks + '</span></div>';
      }
      postHtml += '</div></div>';

      // Cover image
      if (article.cover) {
        postHtml += '<img class="postcover" src="' + article.cover + '" alt="文章封面">';
      }

      // Article body
      postHtml += '<div class="post markdown">' + article.content + '</div>';

      // Copyright
      postHtml += '<div class="post-copyright">';
      postHtml += '<div class="post-copyright-info">本文作者：小橘猫 | 发布于 ' + article.date + '</div>';
      postHtml += '<div class="post-copyright-link"><span>本文链接：</span><a href="post.html?id=' + article.id + '">' + article.title + '</a></div>';
      postHtml += '<div class="post-copyright-detail">版权声明：本文采用 <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" title="署名-非商业性使用-相同方式共享" target="_blank">CC BY-NC-SA 4.0</a> 许可协议进行许可。</div>';
      postHtml += '<img class="post-copyright-icon noview" src="assets/images/Hexo-Theme-MEOW.png" alt="Logo">';
      postHtml += '</div>';

      // Tail tags
      if (article.tags.length > 0) {
        postHtml += '<div class="post-tail-tags">';
        article.tags.forEach(function(tag) {
          postHtml += '<a href="tags.html" class="post-tail-tags">' + tag + '</a> ';
        });
        postHtml += '</div>';
      }

      // Navigator (prev/next)
      var idx = articles.findIndex(function(a) { return a.id === articleId; });
      postHtml += '<div class="post-nav">';
      if (idx > 0) {
        var prev = articles[idx - 1];
        postHtml += '<a class="post-nav-prev" href="post.html?id=' + prev.id + '" title="' + prev.title + '">上一篇<span>' + prev.title + '</span></a>';
      } else {
        postHtml += '<a class="post-nav-prev" nopost="">上一篇<span>没有更早的文章了</span></a>';
      }
      if (idx < articles.length - 1) {
        var next = articles[idx + 1];
        postHtml += '<a class="post-nav-next" href="post.html?id=' + next.id + '" title="' + next.title + '">下一篇<span>' + next.title + '</span></a>';
      } else {
        postHtml += '<a class="post-nav-next" nopost="">下一篇<span>没有更新的文章了</span></a>';
      }
      postHtml += '</div>';

      document.getElementById('post-content-area').innerHTML = postHtml;

      // Generate TOC from headings
      var postEl = document.querySelector('.post.markdown');
      if (postEl) {
        var headings = postEl.querySelectorAll('h1, h2, h3');
        var tocHtml = '';
        headings.forEach(function(h, i) {
          if (!h.id) h.id = 'heading-' + i;
          var level = parseInt(h.tagName.substring(1));
          var indent = (level - 1) * 1;
          tocHtml += '<a class="toc-list-link" href="#' + h.id + '" style="padding-left:' + (indent * 0.8) + 'rem">' + h.textContent + '</a>';
        });
        document.getElementById('toc-div').innerHTML = tocHtml;
      }

      // Update share button data-text
      var shareBtn = document.getElementById('tool-share');
      if (shareBtn) {
        shareBtn.setAttribute('data-text', window.location.href);
      }

      // Re-init lazyload for new images
      if (typeof initLazyLoad === 'function') initLazyLoad();
      if (typeof initImageView === 'function') initImageView();
  });
})();
</script>
